version: '3.8'

services:
  scraper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arena-scraper
    restart: unless-stopped
    volumes:
      - ./data:/data
    environment:
      - DATABASE_PATH=/data/app.db
      - SCRAPE_INTERVAL_MINUTES=10
      - NTFY_URL=
      - ALERT_ON_FIRST_RUN=false

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: arena-web
    restart: unless-stopped
    ports:
      - "8088:3000"
    volumes:
      - ./data:/data
    environment:
      - DATABASE_PATH=/data/app.db
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
