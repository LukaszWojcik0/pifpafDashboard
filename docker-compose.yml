version: '3.8'

volumes:
  pifpaf-data:

services:
  scraper:
    build:
      context: ./arena-dashboard/scraper
      dockerfile: Dockerfile
    container_name: arena-scraper
    restart: unless-stopped
    volumes:
      - pifpaf-data:/data
    environment:
      - DATABASE_PATH=/data/app.db
      - SCRAPE_INTERVAL_MINUTES=${SCRAPE_INTERVAL_MINUTES:-10}
      - NTFY_URL=${NTFY_URL}
      - ALERT_ON_FIRST_RUN=${ALERT_ON_FIRST_RUN:-false}

  web:
    build:
      context: ./arena-dashboard/web
      dockerfile: Dockerfile
    container_name: arena-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8088}:3000"
    volumes:
      - pifpaf-data:/data
    environment:
      - DATABASE_PATH=/data/app.db
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  duckdns:
    image: lscr.io/linuxserver/duckdns:latest
    container_name: arena-duckdns
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Warsaw
      - SUBDOMAINS=${DUCKDNS_SUBDOMAIN}
      - TOKEN=${DUCKDNS_TOKEN}
