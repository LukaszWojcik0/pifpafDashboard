version: '3.8'

volumes:
  pifpaf-data:
  gluetun-data:

services:
  vpn:
    image: qmcgaw/gluetun
    container_name: gluetun
    restart: always
    cap_add:
      - NET_ADMIN
    ports:
      - "${WEB_PORT:-8088}:3000/tcp" # Port do dashboardu jest teraz na kontenerze VPN
    volumes:
      - /etc/openvpn/privatevpn.conf:/gluetun/custom.conf:ro # Montujemy plik z systemu hosta (tylko do odczytu)
      - gluetun-data:/gluetun
    environment:
      - VPN_SERVICE_PROVIDER=custom
      - VPN_TYPE=openvpn
      - OPENVPN_CUSTOM_CONFIG=/gluetun/custom.conf # Ścieżka do zamontowanego pliku wewnątrz kontenera
      - OPENVPN_USER=${VPN_USER}
      - OPENVPN_PASSWORD=${VPN_PASSWORD}
      - FIREWALL_VPN_INPUT_PORTS=3000 # Zezwól na ruch przychodzący na porcie dashboardu
      - TZ=Europe/Warsaw

  scraper:
    build:
      context: ./arena-dashboard/scraper
      dockerfile: Dockerfile
    container_name: arena-scraper
    restart: unless-stopped
    volumes:
      - pifpaf-data:/data
    environment:
      - DATABASE_PATH=/data/app.db
      - SCRAPE_INTERVAL_MINUTES=${SCRAPE_INTERVAL_MINUTES:-10}
      - NTFY_URL=${NTFY_URL}
      - ALERT_ON_FIRST_RUN=${ALERT_ON_FIRST_RUN:-false}
    network_mode: "service:vpn"
    depends_on: [vpn]

  web:
    build:
      context: ./arena-dashboard/web
      dockerfile: Dockerfile
    container_name: arena-web
    restart: unless-stopped
    volumes:
      - pifpaf-data:/data
    environment:
      - DATABASE_PATH=/data/app.db
      - HOSTNAME=0.0.0.0
    network_mode: "service:vpn"
    depends_on: [vpn]
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  duckdns:
    image: lscr.io/linuxserver/duckdns:latest
    container_name: arena-duckdns
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Warsaw
      - SUBDOMAINS=${DUCKDNS_SUBDOMAIN}
      - TOKEN=${DUCKDNS_TOKEN}
    network_mode: "service:vpn"
    depends_on: [vpn]
